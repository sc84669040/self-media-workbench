project:
  name: self-media-workbench

paths:
  runtime_dir: ${repo_root}/runtime
  sample_vault_path: ${runtime_dir}/sample-vault
  event_radar_db_path: ${runtime_dir}/event_radar.db
  event_radar_mirror_db_path: ${runtime_dir}/event_radar.mirror.db
  create_studio_db_path: ${runtime_dir}/create_studio.db
  creation_data_root: ${runtime_dir}/creation
  fetch_output_dir: ${runtime_dir}/fetched

services:
  creative_studio:
    host: 127.0.0.1
    port: 8791
  content_search_layer:
    host: 127.0.0.1
    port: 8787
  content_fetch_hub:
    host: 127.0.0.1
    port: 8788
  rsshub:
    enabled: false
    base_url: http://127.0.0.1:1200

credentials:
  openai_api_key_env: OPENAI_API_KEY
  writing_api_key_env: CREATE_STUDIO_WRITING_API_KEY
  autofill_api_key_env: CREATE_STUDIO_AUTOFILL_API_KEY
  twitter_auth_token_env: TWITTER_AUTH_TOKEN
  twitter_ct0_env: TWITTER_CT0
  youtube_cookies_path_env: YT_DLP_COOKIES_PATH
  bilibili_cookies_path_env: BILIBILI_COOKIES_PATH
  telegram_bot_token_env: NIGHTHAWK_TELEGRAM_BOT_TOKEN

external_tools:
  yt_dlp_bin: ""
  twitter_bin: ""
  funasr_transcribe_script: ""
  ffmpeg_bin: ""

sources:
  feeds:
    - id: openai-blog
      name: OpenAI Blog
      url: https://openai.com/blog/rss.xml
      category: official_blog
      enabled: true
    - id: google-deepmind-blog
      name: Google DeepMind Blog
      url: https://blog.google/technology/ai/rss/
      category: official_blog
      enabled: true
  youtube_channels: []
  wechat_sources: []
  feishu_sources: []
  douyin_sources: []
  x_accounts: []

content_fetch_hub:
  retry_count: 1
  write_obsidian_default: false
  vault_path: ${sample_vault_path}
  youtube_cookies_path: ""
  bilibili_cookies_path: ""

creative_studio:
  knowledge_sources:
    vault_roots:
      - ${sample_vault_path}
    analysis_card_globs:
      - ${sample_vault_path}/analysis-cards/**/*.md
    source_note_globs:
      - ${sample_vault_path}/**/*.md
  semantic_search:
    embedding_provider: disabled
    embedding_model: ""
    enable_fts: true
    enable_embedding: false
    rerank_top_k: 40
    final_top_k: 20
  event_clustering:
    mode: semi_auto
    auto_run_enabled: false
    auto_run_interval_minutes: 20
    lookback_hours: 48
    min_cluster_size: 2
    conservative_threshold: 0.78
    auto_publish_confirmed_only: true
  nighthawk:
    enable_upstream_raw_sync: false
    upstream_timeout_sec: 2
    raw_sync_ttl_sec: 90
    raw_sync_page_size: 100
    raw_sync_max_pages: 8
  autofill:
    provider: mock
    model: ""
    api_base: https://api.openai.com/v1
    api_key_env: CREATE_STUDIO_AUTOFILL_API_KEY
    timeout_sec: 45
    max_materials: 18
    max_chars_per_material: 1800
  writing:
    provider: disabled
    model: ""
    api_base: https://api.openai.com/v1
    api_key_env: CREATE_STUDIO_WRITING_API_KEY
    timeout_sec: 120
    max_materials: 18
    max_chars_per_material: 2200
    quality_check_enabled: true
  writer_adapters:
    default_writer: generic-longform
    profiles:
      khazix-writer:
        available: false
        skill_prompt_path: ""
      generic-longform:
        available: true
  ui:
    enable_debug_panel: true
    show_query_explain: true
    show_cluster_explain: true

notifications:
  telegram:
    enabled: false
    chat_id: ""
    account_id: ""
    openclaw_config: ""
    proxy_env: NIGHTHAWK_TELEGRAM_PROXY
  knowledge_base:
    enabled: false
    vault_path: ${sample_vault_path}
    folder: strong-recommendations
  rules:
    strong_threshold: 8.5
    watch_threshold: 5.0
    bootstrap_skip_older_than_hours: 6
    notify_cooldown_minutes: 10
    cluster_window_minutes: 180
    scan_limit: 100
    send_limit_per_cycle: 1
    failed_retry_limit: 3

scheduler:
  jobs:
    collector:
      enabled: false
      command: python apps/creative-studio/scripts/collector_daemon.py
      interval_minutes: 20
      lookback_hours: 48
      concurrency: 1
      retry_count: 1
    body_worker:
      enabled: false
      command: python apps/creative-studio/scripts/body_worker.py
      interval_minutes: 10
      concurrency: 1
      retry_count: 1
    topic_pipeline:
      enabled: false
      command: python apps/creative-studio/scripts/topic_pipeline/build_topics_v1.py
      interval_minutes: 20
      lookback_hours: 48
      concurrency: 1
      retry_count: 1
    index_sync:
      enabled: true
      command: python scripts/init_runtime.py --profile sample
      interval_minutes: 60
      concurrency: 1
      retry_count: 0
    notifier:
      enabled: false
      command: python apps/creative-studio/scripts/notifier_daemon.py
      interval_minutes: 5
      concurrency: 1
      retry_count: 1
