<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>热点事件工作台</title>
  <style>
    :root {
      --bg: #f4efe8;
      --panel: rgba(255, 251, 245, 0.96);
      --panel-soft: rgba(248, 240, 231, 0.94);
      --line: #d9c7b3;
      --text: #33271d;
      --muted: #776556;
      --accent: #a85d2d;
      --accent-soft: #f4dbc7;
      --success: #2f7d5c;
      --shadow: 0 24px 60px rgba(87, 63, 39, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(216, 170, 128, 0.22), transparent 28%),
        linear-gradient(180deg, #f7f2ea 0%, #eadcc8 100%);
    }
    a { color: var(--accent); }
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }
    .hero, .card {
      background: var(--panel);
      border: 1px solid rgba(217, 199, 179, 0.92);
      box-shadow: var(--shadow);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 420px);
      gap: 18px;
      border-radius: 28px;
      padding: 24px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(168, 93, 45, 0.2);
      background: rgba(168, 93, 45, 0.08);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    h1, h2, h3, h4 {
      font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", serif;
      font-weight: 700;
    }
    .hero h1 {
      margin: 16px 0 10px;
      font-size: 40px;
      line-height: 1.14;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
      font-size: 15px;
    }
    .hero-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-content: start;
    }
    .hero-links a {
      text-decoration: none;
      padding: 11px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(217, 199, 179, 0.95);
      color: var(--text);
    }
    .overview {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .metric {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(217, 199, 179, 0.92);
    }
    .metric strong {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
      color: var(--accent);
    }
    .metric span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .status-banner {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(217, 199, 179, 0.95);
      background: rgba(255, 252, 248, 0.92);
      color: var(--muted);
      white-space: pre-wrap;
    }
    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }
    .stack {
      display: grid;
      gap: 18px;
    }
    .card {
      border-radius: 24px;
      padding: 18px;
    }
    .card h2 { margin: 0 0 12px; font-size: 22px; }
    .card h3 { margin: 0 0 10px; font-size: 18px; }
    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .card-header p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(168, 93, 45, 0.18);
      background: rgba(168, 93, 45, 0.08);
      color: var(--text);
      font-size: 12px;
      text-decoration: none;
    }
    .kv {
      display: grid;
      grid-template-columns: 120px minmax(0, 1fr);
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff8f1;
      background: linear-gradient(135deg, #a85d2d, #8d4c24);
      box-shadow: 0 10px 24px rgba(150, 88, 41, 0.18);
    }
    button.secondary {
      background: rgba(255,255,255,0.84);
      color: var(--text);
      border: 1px solid rgba(217, 199, 179, 0.96);
      box-shadow: none;
    }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .event-summary {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(217, 199, 179, 0.92);
      background: var(--panel-soft);
      line-height: 1.8;
      color: var(--muted);
    }
    .item-list {
      display: grid;
      gap: 10px;
      max-height: 860px;
      overflow: auto;
    }
    .item {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(217, 199, 179, 0.92);
      background: rgba(255, 253, 250, 0.96);
    }
    .item h4 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.45;
    }
    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .empty {
      padding: 14px;
      border-radius: 16px;
      border: 1px dashed rgba(217, 199, 179, 1);
      background: rgba(250, 247, 242, 0.88);
      color: var(--muted);
    }
    @media (max-width: 1200px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .overview { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 720px) {
      .page { padding: 18px 14px 32px; }
      .overview { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div>
        <span class="eyebrow">Event Bridge</span>
        <h1 id="event-title">热点事件工作台</h1>
        <p id="event-subtitle">正在读取事件详情...</p>
        <div class="overview">
          <article class="metric"><strong id="metric-articles">-</strong><span>这条事件当前挂着多少篇正文</span></article>
          <article class="metric"><strong id="metric-topics">-</strong><span>这条事件被多少主题收进去</span></article>
          <article class="metric"><strong id="metric-confidence">-</strong><span>当前事件置信度</span></article>
          <article class="metric"><strong id="metric-body-ready">-</strong><span>正文完整、可直接创作的条目</span></article>
        </div>
        <div class="status-banner" id="status-banner">正在加载事件与正文关系...</div>
      </div>
      <div class="hero-links">
        <a href="/create/studio">进入创作前台</a>
        <a href="/">回到热点主题</a>
        <a href="/create/topic">去主题搜索页</a>
        <a id="link-back-to-nighthawk" href="/create/nighthawk">回到正文资料池</a>
        <a href="/create/workspace">后续编排台</a>
      </div>
    </section>

    <section class="layout">
      <aside class="stack">
        <article class="card">
          <div class="card-header">
            <div>
              <h2>事件判断</h2>
              <p>先看这条事件现在长什么样，再决定是不是直接进入创作。</p>
            </div>
          </div>
          <div class="event-summary" id="event-summary">正在整理事件摘要...</div>
          <div class="pill-row" id="topic-links" style="margin-top:12px;"></div>
        </article>

        <article class="card">
          <div class="card-header">
            <div>
              <h2>创作入口</h2>
              <p>这条事件会直接复用 NightHawk 正文来源，不另起一套创作链路。</p>
            </div>
          </div>
          <div class="button-row">
            <button class="secondary" id="btn-create-packet">生成 Event Packet</button>
            <button class="secondary" id="btn-open-packet" disabled>打开 Event Packet</button>
            <button id="btn-create-task">带着这条事件进入编排</button>
            <button class="secondary" id="btn-open-nighthawk">回正文池继续筛正文</button>
          </div>
        </article>
      </aside>

      <main class="stack">
        <article class="card">
          <div class="card-header">
            <div>
              <h2>相关正文</h2>
              <p>这里列的是这条事件当前挂上的 NightHawk 正文证据。你可以先看正文，再决定是否直接进入创作。</p>
            </div>
          </div>
          <div class="item-list" id="item-list"></div>
        </article>
      </main>
    </section>
  </div>

  <script>
    const eventId = Number(window.location.pathname.split('/').pop() || 0) || 0;
    const statusBanner = document.getElementById('status-banner');
    const eventTitle = document.getElementById('event-title');
    const eventSubtitle = document.getElementById('event-subtitle');
    const eventSummary = document.getElementById('event-summary');
    const topicLinks = document.getElementById('topic-links');
    const itemList = document.getElementById('item-list');
    const backToNighthawk = document.getElementById('link-back-to-nighthawk');
    const createPacketBtn = document.getElementById('btn-create-packet');
    const openPacketBtn = document.getElementById('btn-open-packet');

    let currentPacketId = '';

    async function refreshPacketRef() {
      try {
        const payload = await requestJson(`/api/create/events/${eventId}/packet`);
        const packet = payload.packet || {};
        currentPacketId = packet.packet_id || '';
        openPacketBtn.disabled = !currentPacketId;
      } catch (error) {
        console.error(error);
      }
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    async function requestJson(path, options = {}) {
      const response = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      const payload = await response.json();
      if (!response.ok) throw new Error(payload.message || `请求失败：${response.status}`);
      return payload;
    }

    function setStatus(message) {
      statusBanner.textContent = message;
    }

    function renderEvent(payload) {
      const event = payload.event || {};
      const items = payload.related_items || [];
      const bodyReadyCount = items.filter((item) => item.body_ready).length;
      eventTitle.textContent = event.title || `事件 #${eventId}`;
      eventSubtitle.textContent = event.summary || '这条事件目前还没有完整摘要。';
      eventSummary.innerHTML = `
        <div class="kv">
          <strong>事件类型</strong><span>${escapeHtml(event.event_type || '-')}</span>
          <strong>主体</strong><span>${escapeHtml(event.subject || '-')}</span>
          <strong>对象</strong><span>${escapeHtml(event.object || '-')}</span>
          <strong>状态</strong><span>${escapeHtml(event.status || '-')}</span>
        </div>
      `;
      topicLinks.innerHTML = (payload.topics || []).map((topic) => (
        `<a class="pill" href="/#topics">主题：${escapeHtml(topic.title || topic.topic_key || `#${topic.topic_id}`)}</a>`
      )).join('') || '<span class="pill">暂时没有挂到主题上</span>';

      document.getElementById('metric-articles').textContent = String(items.length);
      document.getElementById('metric-topics').textContent = String((payload.topics || []).length);
      document.getElementById('metric-confidence').textContent = String(event.confidence || 0);
      document.getElementById('metric-body-ready').textContent = String(bodyReadyCount);

      backToNighthawk.href = `/create/nighthawk?event_id=${eventId}${items[0] ? `&highlight_item=${items[0].raw_item_id}` : ''}`;
      openPacketBtn.disabled = !currentPacketId;

      itemList.innerHTML = items.map((item) => `
        <article class="item">
          <div class="meta-line">
            <span>${escapeHtml(item.evidence_role || 'evidence')}</span>
            <span>${escapeHtml(item.platform || 'unknown')}</span>
            <span>${escapeHtml(item.source_name || 'NightHawk')}</span>
            <span>${item.body_ready ? '正文完整' : '正文待补抓'}</span>
          </div>
          <h4>${escapeHtml(item.title || '(无标题正文)')}</h4>
          <div class="meta-line">
            <span>${escapeHtml(item.published_at || '时间未知')}</span>
            <a href="/create/nighthawk?event_id=${eventId}&highlight_item=${Number(item.raw_item_id || 0)}">回正文池查看</a>
            ${item.canonical_url ? `<a href="${escapeHtml(item.canonical_url)}" target="_blank" rel="noreferrer">打开原文</a>` : ''}
          </div>
          <div style="color:var(--muted); line-height:1.8;">${escapeHtml(item.summary || '暂无摘要')}</div>
        </article>
      `).join('') || '<div class="empty">这条事件暂时还没有挂到正文证据。</div>';

      setStatus(`这条事件当前挂着 ${items.length} 条 NightHawk 正文，其中 ${bodyReadyCount} 条已经能直接拿来做创作材料。`);

      document.getElementById('btn-create-task').onclick = async () => {
        if (!items.length) {
          setStatus('这条事件暂时没有可用正文，先回正文池继续补材料。');
          return;
        }
        setStatus('正在把事件关联正文转成正式创作任务...');
        const response = await requestJson('/api/create/nighthawk/to-task', {
          method: 'POST',
          body: JSON.stringify({
            raw_item_ids: items.map((item) => item.raw_item_id),
            topic: event.title || `事件 ${eventId}`,
            platform: 'wechat',
            angle: event.summary || event.title || '',
          }),
        });
        window.location.href = response.next_url;
      };
      document.getElementById('btn-open-nighthawk').onclick = () => {
        window.location.href = backToNighthawk.href;
      };
      createPacketBtn.onclick = async () => {
        try {
          setStatus('正在生成 Event Packet...');
          const response = await requestJson('/api/create/event-packets', {
            method: 'POST',
            body: JSON.stringify({
              event_id: eventId,
              topic: event.title || `事件 ${eventId}`,
            }),
          });
          const packet = response.event_packet || {};
          currentPacketId = packet.packet_id || '';
          openPacketBtn.disabled = !currentPacketId;
          setStatus('Event Packet 已生成。你现在可以直接打开详情页，或者继续把这条事件送进创作。');
        } catch (error) {
          console.error(error);
          setStatus(`生成 Event Packet 失败：${error.message}`);
        }
      };
      openPacketBtn.onclick = () => {
        if (!currentPacketId) return;
        window.location.href = `/create/event-packets/${currentPacketId}`;
      };
    }

    if (!eventId) {
      setStatus('缺少事件 ID。');
    } else {
      Promise.all([requestJson(`/api/events/${eventId}`), refreshPacketRef()])
        .then(([payload]) => renderEvent(payload))
        .catch((error) => {
          console.error(error);
          setStatus(`事件页加载失败：${error.message}`);
          itemList.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        });
    }
  </script>
</body>
</html>
