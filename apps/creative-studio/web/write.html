<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文章编辑台</title>
  <style>
    :root {
      --ink: #102b3c;
      --muted: #5f7285;
      --line: #dbe5ec;
      --soft: #f5f9fb;
      --card: rgba(255,255,255,.88);
      --accent: #0f628f;
      --accent-2: #d8ecf8;
      --danger: #b64747;
      --ok: #24785a;
      --shadow: 0 24px 80px rgba(36, 74, 95, .12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Iowan Old Style", "LXGW WenKai", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(216, 236, 248, .9), transparent 28%),
        linear-gradient(135deg, #f8fbfd 0%, #eef6fa 100%);
      min-height: 100vh;
    }
    .shell { width: min(1500px, calc(100vw - 48px)); margin: 0 auto; padding: 34px 0 44px; }
    .hero { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-bottom: 22px; }
    .badge { display:inline-flex; padding: 8px 14px; border:1px solid #bfd6e4; background: #eef7fc; border-radius:999px; color:var(--accent); font-weight:800; }
    h1 { margin: 12px 0 4px; font-size: clamp(40px, 5vw, 70px); line-height: .95; letter-spacing: -.04em; }
    .subtitle { color: var(--muted); font-size: 18px; line-height: 1.7; max-width: 900px; }
    .actions { display:flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
    button, a.action {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--ink);
      color: white;
      font-weight: 850;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(16,43,60,.14);
    }
    button.secondary, a.action.secondary { background: #e5f1f7; color: var(--accent); box-shadow: none; border:1px solid #c7dce8; }
    button:disabled { opacity: .58; cursor: not-allowed; }
    .grid { display:grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 20px; align-items:start; }
    .card { background: var(--card); border:1px solid var(--line); border-radius: 30px; box-shadow: var(--shadow); padding: 22px; backdrop-filter: blur(18px); }
    .editor-card { padding: 0; overflow: hidden; }
    .editor-head { padding: 18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .meta { color: var(--muted); font-size: 14px; }
    textarea {
      width: 100%;
      min-height: 72vh;
      border: 0;
      resize: vertical;
      padding: 24px;
      color: var(--ink);
      background: rgba(255,255,255,.72);
      font: 18px/1.85 "Iowan Old Style", "LXGW WenKai", "Microsoft YaHei", serif;
      outline: none;
    }
    h2 { margin: 0 0 14px; font-size: 24px; }
    .status { margin: 12px 0 0; color: var(--muted); line-height: 1.6; }
    .status.error { color: var(--danger); }
    .status.success { color: var(--ok); }
    .pill-row { display:flex; flex-wrap:wrap; gap:8px; margin: 10px 0 14px; }
    .pill { background: var(--accent-2); border:1px solid #bfd6e4; color: var(--accent); border-radius:999px; padding: 7px 11px; font-size: 13px; font-weight:800; }
    .quality-summary { padding: 14px; background: var(--soft); border:1px solid var(--line); border-radius: 18px; line-height:1.7; }
    .suggestion-list { display:grid; gap:10px; margin-top: 14px; }
    .suggestion-card { display:flex; gap:10px; align-items:flex-start; padding:12px; border:1px solid var(--line); border-radius:16px; background:#f8fbfd; color:var(--ink); cursor:pointer; }
    .suggestion-card input { margin-top: 4px; }
    .suggestion-card strong { display:block; margin-bottom:4px; }
    .suggestion-card span { display:block; color:var(--muted); line-height:1.55; font-size:14px; }
    .custom-revision { margin-top: 12px; padding: 12px; border:1px solid var(--line); border-radius:18px; background:rgba(248,251,253,.82); }
    .custom-revision label { display:block; font-weight:850; margin-bottom:8px; }
    .custom-revision textarea {
      min-height: 110px;
      padding: 12px;
      border: 1px solid #cbdde8;
      border-radius: 14px;
      background: white;
      font-size: 15px;
      line-height: 1.65;
      resize: vertical;
    }
    details { margin-top: 14px; }
    summary { cursor:pointer; color: var(--accent); font-weight:850; }
    pre { white-space: pre-wrap; word-break: break-word; background:#f7fbfd; border:1px solid var(--line); border-radius:18px; padding:14px; color:#33485a; max-height: 460px; overflow:auto; }
    ul { padding-left: 20px; line-height: 1.7; color: var(--muted); }
    @media (max-width: 980px) {
      .shell { width: min(100vw - 24px, 760px); padding-top: 20px; }
      .hero { align-items:flex-start; flex-direction:column; }
      .actions { justify-content:flex-start; }
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 62vh; font-size:16px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <span class="badge">Writing Studio</span>
        <h1>文章编辑台</h1>
        <div class="subtitle">这里是生成后的正文编辑区。你可以直接修改、保存、重新生成，也可以把 Markdown 下载出来继续处理。</div>
      </div>
      <div class="actions">
        <a id="back-link" class="action secondary" href="/create/workspace">返回编排台</a>
        <button id="save-btn" type="button" class="secondary">保存编辑</button>
        <button id="regen-btn" type="button" class="secondary">重新生成</button>
        <button id="download-btn" type="button">下载 Markdown</button>
      </div>
    </section>

    <section class="grid">
      <article class="card editor-card">
        <div class="editor-head">
          <div>
            <strong id="draft-title">加载中...</strong>
            <div id="draft-meta" class="meta"></div>
          </div>
          <span id="draft-state" class="pill">草稿</span>
        </div>
        <textarea id="article-editor" placeholder="文章正文加载中..."></textarea>
      </article>

      <aside class="card">
        <h2>自动质检</h2>
        <div id="quality-panel" class="quality-summary">等待草稿加载。</div>
        <div id="suggestion-panel"></div>
        <details>
          <summary>查看完整报告</summary>
          <pre id="quality-raw">{}</pre>
        </details>
        <div id="status" class="status"></div>
      </aside>
    </section>
  </main>

  <script>
    const query = new URLSearchParams(window.location.search);
    let draftId = query.get('draft_id') || '';
    let state = { draft: null, task: null };

    const editorEl = document.getElementById('article-editor');
    const statusEl = document.getElementById('status');
    const qualityPanelEl = document.getElementById('quality-panel');
    const suggestionPanelEl = document.getElementById('suggestion-panel');
    const qualityRawEl = document.getElementById('quality-raw');
    const titleEl = document.getElementById('draft-title');
    const metaEl = document.getElementById('draft-meta');
    const stateEl = document.getElementById('draft-state');
    const backLinkEl = document.getElementById('back-link');
    const saveBtnEl = document.getElementById('save-btn');
    const regenBtnEl = document.getElementById('regen-btn');
    const downloadBtnEl = document.getElementById('download-btn');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;',
      }[char]));
    }

    function setStatus(message, type = '') {
      statusEl.textContent = message || '';
      statusEl.className = `status ${type}`.trim();
    }

    function setBusy(button, busy, idleText, busyText) {
      button.disabled = Boolean(busy);
      button.textContent = busy ? busyText : idleText;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        method: options.method || 'GET',
        headers: { 'Content-Type': 'application/json' },
        body: options.body ? JSON.stringify(options.body) : undefined,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.message || `请求失败：${response.status}`);
      }
      return payload;
    }

    function renderQuality(report) {
      const issues = Array.isArray(report?.issues) ? report.issues : [];
      const suggestions = Array.isArray(report?.revision_suggestions) ? report.revision_suggestions : [];
      qualityPanelEl.innerHTML = `
        <strong>${escapeHtml(report?.summary || '暂无质检结果')}</strong>
        ${issues.length ? `<ul>${issues.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>` : '<div class="meta">暂未发现明显问题。</div>'}
      `;
      suggestionPanelEl.innerHTML = suggestions.length ? `
        <h2 style="margin-top:18px;">可选调整</h2>
        <div class="meta">勾选后点“重新生成”，会按选中的方向再出一版。</div>
        <div class="suggestion-list">
          ${suggestions.map((item) => `
            <label class="suggestion-card">
              <input type="checkbox" name="revision_suggestion" value="${escapeHtml(item.id || item.label || '')}" data-prompt="${escapeHtml(item.prompt || '')}" />
              <div>
                <strong>${escapeHtml(item.label || item.id || '调整建议')}</strong>
                <span>${escapeHtml(item.prompt || '')}</span>
              </div>
            </label>
          `).join('')}
        </div>
        ${renderCustomRevisionBox()}
      ` : renderCustomRevisionBox();
      qualityRawEl.textContent = JSON.stringify(report || {}, null, 2);
    }

    function renderCustomRevisionBox() {
      return `
        <div class="custom-revision">
          <label for="custom-revision-input">自定义调整</label>
          <textarea id="custom-revision-input" placeholder="例如：开头再锋利一点，增加一段个人观察，删除结尾的署名感，整体更像深夜长文。"></textarea>
        </div>
      `;
    }

    function render(payload) {
      state.draft = payload.article_draft || {};
      state.task = payload.task || {};
      const draft = state.draft;
      titleEl.textContent = draft.title || state.task.topic || draft.id || '未命名文章';
      metaEl.textContent = `${draft.writer_skill || 'writer'} · ${draft.model || draft.generation_source || 'local'} · ${draft.updated_at || draft.created_at || ''}`;
      stateEl.textContent = draft.status || '草稿';
      editorEl.value = payload.article_markdown || '';
      if (draft.creation_task_id) {
        backLinkEl.href = `/create/workspace?task_id=${encodeURIComponent(draft.creation_task_id)}`;
      }
      renderQuality(draft.quality_report || {});
    }

    async function loadDraft() {
      if (!draftId) {
        setStatus('缺少 draft_id，无法打开文章。', 'error');
        return;
      }
      setStatus('正在加载文章...');
      const payload = await api(`/api/create/drafts/${encodeURIComponent(draftId)}`);
      render(payload);
      setStatus('');
    }

    async function saveDraft() {
      setBusy(saveBtnEl, true, '保存编辑', '保存中...');
      try {
        const payload = await api(`/api/create/drafts/${encodeURIComponent(draftId)}`, {
          method: 'POST',
          body: {
            article_markdown: editorEl.value,
            title: titleEl.textContent,
            status: 'draft',
          },
        });
        render(payload);
        setStatus('已保存当前编辑。', 'success');
      } catch (error) {
        setStatus(`保存失败：${error.message}`, 'error');
      } finally {
        setBusy(saveBtnEl, false, '保存编辑', '保存中...');
      }
    }

    async function regenerateDraft() {
      const taskId = state.draft?.creation_task_id;
      if (!taskId) {
        setStatus('当前草稿缺少任务信息，无法重新生成。', 'error');
        return;
      }
      setBusy(regenBtnEl, true, '重新生成', '生成中...');
      try {
        const selectedSuggestions = Array.from(document.querySelectorAll('input[name="revision_suggestion"]:checked')).map((item) => ({
          id: item.value,
          prompt: item.dataset.prompt || '',
        }));
        const customRevision = String(document.getElementById('custom-revision-input')?.value || '').trim();
        if (customRevision) {
          selectedSuggestions.push({
            id: 'custom_revision',
            label: '自定义调整',
            prompt: customRevision,
          });
        }
        const payload = await api(`/api/create/tasks/${encodeURIComponent(taskId)}/article/generate`, {
          method: 'POST',
          body: {
            regenerate_from_draft_id: draftId,
            selected_revision_suggestions: selectedSuggestions,
          },
        });
        draftId = payload.article_draft?.id || draftId;
        history.replaceState(null, '', `/create/write?draft_id=${encodeURIComponent(draftId)}`);
        render(payload);
        setStatus('已重新生成一版文章。', 'success');
      } catch (error) {
        setStatus(`重新生成失败：${error.message}`, 'error');
      } finally {
        setBusy(regenBtnEl, false, '重新生成', '生成中...');
      }
    }

    saveBtnEl.addEventListener('click', saveDraft);
    regenBtnEl.addEventListener('click', regenerateDraft);
    downloadBtnEl.addEventListener('click', () => {
      if (!draftId) return;
      window.location.href = `/api/create/drafts/${encodeURIComponent(draftId)}/download?format=md`;
    });

    loadDraft().catch((error) => setStatus(`加载失败：${error.message}`, 'error'));
  </script>
</body>
</html>
