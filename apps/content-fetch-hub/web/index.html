<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>content-fetch-hub</title>
    <style>
      body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; margin: 0; background: #0b1020; color: #e8ecf3; }
      .wrap { max-width: 760px; margin: 36px auto; padding: 0 16px; }
      .card { background: #141b34; border: 1px solid #273157; border-radius: 12px; padding: 18px; }
      .title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
      .sub { color: #9aa5c7; margin-bottom: 14px; }
      input, button, textarea { width: 100%; box-sizing: border-box; border-radius: 10px; border: 1px solid #33406e; background: #0f1530; color: #e8ecf3; }
      input { padding: 12px; font-size: 14px; }
      button { margin-top: 10px; padding: 12px; font-size: 14px; cursor: pointer; background: #2b4dff; border-color: #2b4dff; font-weight: 600; }
      button[disabled] { opacity: 0.6; cursor: not-allowed; }
      .status { margin-top: 10px; font-size: 13px; color: #9aa5c7; }
      .ok { color: #6ee7a6; }
      .bad { color: #ff8b8b; }
      textarea { margin-top: 12px; min-height: 280px; padding: 10px; font-family: ui-monospace,SFMono-Regular,Menlo,monospace; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title">content-fetch-hub · 极简抓取页</div>
        <div class="sub">输入链接，点击抓取，返回成功/失败和保存路径。</div>
        <input id="url" placeholder="https://..." />
        <button id="btn">开始抓取</button>
        <div class="status" id="status">等待输入链接</div>
        <textarea id="result" readonly placeholder="结果会显示在这里"></textarea>
      </div>
    </div>

    <script>
      const $url = document.getElementById('url');
      const $btn = document.getElementById('btn');
      const $status = document.getElementById('status');
      const $result = document.getElementById('result');

      async function run() {
        const url = ($url.value || '').trim();
        if (!url) {
          $status.textContent = '请先输入链接';
          $status.className = 'status bad';
          return;
        }

        $btn.disabled = true;
        $status.textContent = '抓取中...';
        $status.className = 'status';
        $result.value = '';

        try {
          const resp = await fetch('/api/fetch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url })
          });
          const data = await resp.json();
          const first = (data.results || [])[0] || {};
          if (resp.ok && data.ok && first.status === 'success') {
            $status.textContent = `抓取成功：${first.channel || '-'} | ${first.title || ''}`;
            $status.className = 'status ok';
          } else if (first.status === 'skipped') {
            $status.textContent = `已跳过（去重）：${first.error || ''}`;
            $status.className = 'status';
          } else {
            $status.textContent = `抓取失败：${first.error || data.error || 'unknown'}`;
            $status.className = 'status bad';
          }
          $result.value = JSON.stringify(data, null, 2);
        } catch (err) {
          $status.textContent = `请求失败：${err.message || err}`;
          $status.className = 'status bad';
        } finally {
          $btn.disabled = false;
        }
      }

      $btn.addEventListener('click', run);
      $url.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') run();
      });
    </script>
  </body>
</html>
